<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Экран QR-кода</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-low": "#f2f4f6",
                        "surface-container": "#eceef0",
                        "on-surface": "#191c1e",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "tertiary-fixed-dim": "#bec6e0",
                        "surface": "#f7f9fb",
                        "primary-fixed": "#dde1ff",
                        "inverse-surface": "#2d3133",
                        "on-surface-variant": "#444653",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d8dadc",
                        "primary-container": "#1e40af",
                        "primary": "#00288e",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#dae2fd",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "outline-variant": "#c4c5d5",
                        "on-primary-container": "#a8b8ff",
                        "tertiary": "#2d3449",
                        "on-primary-fixed": "#001453",
                        "on-tertiary-container": "#b4bbd5",
                        "surface-tint": "#3755c3",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "outline": "#757684",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-secondary-container": "#54647a",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-container": "#434b60",
                        "on-secondary-fixed": "#0b1c30",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "surface-bright": "#f7f9fb",
                        "on-primary-fixed-variant": "#173bab",
                        "on-background": "#191c1e",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-tertiary-fixed": "#131b2e",
                        "secondary-container": "#d0e1fb",
                        "surface-container-high": "#e6e8ea",
                        "secondary-fixed": "#d3e4fe",
                        "on-error": "#ffffff",
                        "secondary": "#505f76",
                        "inverse-primary": "#b8c4ff",
                        "background": "#f7f9fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sm": "8px",
                        "lg": "24px",
                        "gutter": "20px",
                        "margin-mobile": "16px",
                        "xs": "4px",
                        "xl": "32px",
                        "margin-desktop": "40px",
                        "base": "4px",
                        "md": "16px",
                        "max-width": "1280px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter", "sans-serif"],
                        "code-qr": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "code-qr": ["11px", { "lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center relative p-margin-mobile md:p-margin-desktop">
<!-- Exit Button (Top Right) -->
<button aria-label="Закрыть" class="absolute top-margin-mobile right-margin-mobile md:top-margin-desktop md:right-margin-desktop p-md text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors flex items-center justify-center cursor-pointer">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Main Container -->
<main class="w-full max-w-[640px] bg-surface-container-lowest border border-outline-variant rounded-xl p-lg md:p-xl flex flex-col items-center text-center">
<!-- Header -->
<header class="mb-xl w-full">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm">
                Введение в программирование
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Лекция 4 • Аудитория 314
            </p>
</header>
<!-- QR Code Section -->
<div class="flex flex-col items-center w-full mb-xl">
<!-- QR Container with Quiet Zone -->
<div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-lg mb-md w-64 h-64 md:w-80 md:h-80 flex items-center justify-center bg-white">
<!-- Using a visually generated QR representation via CSS grid for immediate rendering reliability in high-utility context -->
<div aria-label="QR код для отметки посещаемости" class="w-full h-full bg-[url('https://api.qrserver.com/v1/create-qr-code/?size=300x300&amp;data=AttendanceCheckinID12345')] bg-cover bg-center"></div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">
                Отсканируйте камерой телефона для отметки
            </p>
<!-- Refresh Timer -->
<div class="w-full max-w-[240px] mt-lg flex flex-col items-center">
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden mb-sm">
<div class="h-full bg-primary w-2/3 origin-left animate-[pulse_2s_ease-in-out_infinite]"></div>
</div>
<span class="font-code-qr text-code-qr text-primary uppercase">
                    Обновление через 15 сек
                </span>
</div>
</div>
<!-- Live Counter -->
<div class="w-full border-t border-outline-variant pt-lg mt-sm flex items-center justify-center">
<div class="inline-flex items-center gap-md bg-secondary-container text-on-secondary-container px-lg py-md rounded-xl">
<span class="material-symbols-outlined" data-icon="group" data-weight="fill" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-headline-md text-headline-md">
                    Отметились: <strong class="text-on-secondary-container">12 / 30</strong>
</span>
</div>
</div>
</main>
</body></html>
